<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Fruits & Vegetables - Veve Bazaar </title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Cart Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Header & Navigation -->
    <header class="navbar">
        <div class="logo">
            Veve<span>Bazaar</span>
        </div>
        <div class="cart-container">
            <i class="fa-solid fa-cart-shopping"></i>
            <span class="cart-badge" id="cart-count">0</span>
        </div>
    </header>

    <!-- Hero Banner -->
    <section class="hero-banner">
        <div class="hero-content">
            <h1>Fruits & Vegetables</h1>
            <p>Fresh from the farm to your doorstep! 100% Organic & Healthy.</p>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main-container">
        <!-- Filters -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="fruit">Fresh Fruits</button>
            <button class="filter-btn" data-filter="vegetable">Fresh Vegetables</button>
        </div>

        <!-- Product Grid -->
        <div class="product-grid" id="product-grid">
            <!-- JavaScript yahan products load karega -->
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
